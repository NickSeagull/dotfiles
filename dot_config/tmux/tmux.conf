# tmux — Spacemacs-inspired, Zellij-parity key tables
#
# MENTAL MODEL:
#   Root (default) — terminal gets all keys, tmux is invisible
#   Ctrl+g         — enter command layer (like SPC in spacemacs)
#   Alt+h/j/k/l    — quick pane nav, always available
#   Alt+Shift+h/j/k/l — move panes, always available
#   Alt+n          — new pane, always available
#   Alt+±          — resize, always available
#
# COMMAND LAYER (after Ctrl+g):
#   p → Pane    t → Tab      r → Resize
#   m → Move    S → Scroll   o → Session
#   s → split ↓   v → split →   n → new pane
#   x → close      f → fullscreen w → float
#   h/j/k/l → navigate panes   1-9 → jump to window
#   Esc or Ctrl+g → cancel, back to root

# ── Options ──────────────────────────────────────────────────

# Prefix: Ctrl+g (matching Zellij)
unbind C-b
set -g prefix None                      # disable default prefix entirely
set -g status-keys vi
set -g mode-keys vi

# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-256color:RGB:usstyle"
set -ga terminal-overrides ",*256col*:Tc,*:Smulx=\E[4::%p1%dm,*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"
set -g allow-passthrough on
set -g extended-keys on
set -g focus-events on
set -g escape-time 0                    # no Esc delay (critical for vim)
set -g mouse on
set -g history-limit 50000

# Numbering
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Status bar refresh (1s for near-instant mode indicator)
set -g status-interval 5

# Don't exit tmux when closing a session
set -g detach-on-destroy off

# ── Status Bar — Cyberpunk CJK HUD ──────────────────────────
# Colors from Freshcut Contrast palette

set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#181825,fg=#DCE0E8"
set -g status-left-length 50
set -g status-right-length 80

# Mode indicator: reads #{client_key_table} for real-time mode display
# ── Left: [MODE] ◈ session ┃ windows...
set -g status-left "\
#{?#{==:#{client_key_table},root},#[fg=#CF433E bold]「⟁ LOCK」,\
#{?#{==:#{client_key_table},command},#[fg=#AEE239 bold]「⚡ CMD 」,\
#{?#{==:#{client_key_table},pane-mode},#[fg=#00A8C6 bold]「◈ PANE」,\
#{?#{==:#{client_key_table},tab-mode},#[fg=#F7B83D bold]「◇ TAB 」,\
#{?#{==:#{client_key_table},resize-mode},#[fg=#F7B83D bold]「↔ SIZE」,\
#{?#{==:#{client_key_table},move-mode},#[fg=#C8D7E8 bold]「⇄ MOVE」,\
#{?#{==:#{client_key_table},session-mode},#[fg=#C8D7E8 bold]「◎ SESS」,\
#[fg=#C8D7E8 bold]「▼ SCRL」\
}}}}}}}\
 #[fg=#4ECDC4 bold]◈ #S #[fg=#3B3D4E]┃"

# ── Right: git branch ┃ datetime
set -g status-right "\
#[fg=#89B4FA]#(git -C #{pane_current_path} rev-parse --abbrev-ref HEAD 2>/dev/null)\
#[fg=#3B3D4E] ┃ #[fg=#6C7086]%d·%b %H:%M "

# ── Window (tab) format
set -g window-status-separator ""
set -g window-status-format         "#[fg=#3B3D4E] ┃ #[fg=#6C7086]#{window_index} #{window_name} #{?window_zoomed_flag,□ ,}"
set -g window-status-current-format "#[fg=#3B3D4E] ┃ #[fg=#F8F8F2 bold]「#{window_index} #{window_name}」#{?window_zoomed_flag,□ ,}"

# ── Borders
set -g pane-border-style "fg=#3B3D4E"
set -g pane-active-border-style "fg=#4ECDC4"
set -g pane-border-lines single

# ── Message & command prompt
set -g message-style "bg=#181825,fg=#AEE239,bold"
set -g message-command-style "bg=#181825,fg=#F7B83D"

# ── Copy mode highlight
set -g mode-style "bg=#3B3D4E,fg=#F8F8F2"

# ── Keybindings ──────────────────────────────────────────────

# ROOT — full terminal passthrough
# Only Ctrl+g escapes to the command layer.
bind -n C-g switch-client -T command \; refresh-client -S

# ── Always available (root table, no prefix) ─────────────────

# Alt+hjkl: quick pane navigation (vim-tmux-navigator aware)
# When inside vim, forward the key so vim handles split navigation
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n M-h if-shell "$is_vim" "send-keys M-h" "select-pane -L"
bind -n M-j if-shell "$is_vim" "send-keys M-j" "select-pane -D"
bind -n M-k if-shell "$is_vim" "send-keys M-k" "select-pane -U"
bind -n M-l if-shell "$is_vim" "send-keys M-l" "select-pane -R"

# Alt+Shift+hjkl: move panes
bind -n M-H swap-pane -t "{left-of}"
bind -n M-J swap-pane -t "{down-of}"
bind -n M-K swap-pane -t "{up-of}"
bind -n M-L swap-pane -t "{right-of}"

# Alt+n: new pane
bind -n M-n split-window -h -c "#{pane_current_path}"

# Alt+±: resize
bind -n M-= resize-pane -Z
bind -n M-- resize-pane -Z

# Alt+p: session navigator (always available, like Zellij's Alt+p)
bind -n M-p run-shell "$HOME/.tmux/plugins/tmux-sessionx/scripts/sessionx.sh"

# ── COMMAND — spacemacs-style command layer (Ctrl+g) ─────────

# Sub-mode activation
bind -T command p switch-client -T pane-mode    \; refresh-client -S
bind -T command t switch-client -T tab-mode     \; refresh-client -S
bind -T command r switch-client -T resize-mode  \; refresh-client -S
bind -T command m switch-client -T move-mode    \; refresh-client -S
bind -T command S copy-mode                     \; refresh-client -S
bind -T command o switch-client -T session-mode \; refresh-client -S

# Quick actions (execute → return to root)
bind -T command s   split-window -v -c "#{pane_current_path}" \; refresh-client -S
bind -T command v   split-window -h -c "#{pane_current_path}" \; refresh-client -S
bind -T command n   split-window -h -c "#{pane_current_path}" \; refresh-client -S
bind -T command -   split-window -v -c "#{pane_current_path}" \; refresh-client -S
bind -T command |   split-window -h -c "#{pane_current_path}" \; refresh-client -S
bind -T command x   kill-pane    \; refresh-client -S
bind -T command f   resize-pane -Z \; refresh-client -S
bind -T command z   set pane-border-status \; refresh-client -S
bind -T command d   detach-client
bind -T command q   confirm-before -p "Kill session? (y/n)" kill-session

# Cheatsheet
bind -T command ?   display-popup -E -w 80% -h 80% "less ~/.config/tmux/cheatsheet.txt" \; refresh-client -S

# hjkl pane/window navigation
bind -T command h   select-pane -L  \; refresh-client -S
bind -T command j   select-pane -D  \; refresh-client -S
bind -T command k   select-pane -U  \; refresh-client -S
bind -T command l   select-pane -R  \; refresh-client -S

# Jump to window by number
bind -T command 1   select-window -t :1 \; refresh-client -S
bind -T command 2   select-window -t :2 \; refresh-client -S
bind -T command 3   select-window -t :3 \; refresh-client -S
bind -T command 4   select-window -t :4 \; refresh-client -S
bind -T command 5   select-window -t :5 \; refresh-client -S
bind -T command 6   select-window -t :6 \; refresh-client -S
bind -T command 7   select-window -t :7 \; refresh-client -S
bind -T command 8   select-window -t :8 \; refresh-client -S
bind -T command 9   select-window -t :9 \; refresh-client -S

# Cancel → root
bind -T command Escape refresh-client -S      # Esc: back to root (implicit, table exits)
bind -T command C-g    refresh-client -S       # Ctrl+g again: back to root

# ── PANE — manage panes (Ctrl+g → p) ─────────────────────────
# Sticky mode: stay in pane-mode for navigation, one-shot for actions

bind -T pane-mode h   select-pane -L  \; switch-client -T pane-mode \; refresh-client -S
bind -T pane-mode j   select-pane -D  \; switch-client -T pane-mode \; refresh-client -S
bind -T pane-mode k   select-pane -U  \; switch-client -T pane-mode \; refresh-client -S
bind -T pane-mode l   select-pane -R  \; switch-client -T pane-mode \; refresh-client -S
bind -T pane-mode p   last-pane       \; switch-client -T pane-mode \; refresh-client -S

# One-shot actions (execute → root)
bind -T pane-mode n   split-window -h -c "#{pane_current_path}" \; refresh-client -S
bind -T pane-mode -   split-window -v -c "#{pane_current_path}" \; refresh-client -S
bind -T pane-mode |   split-window -h -c "#{pane_current_path}" \; refresh-client -S
bind -T pane-mode x   kill-pane       \; refresh-client -S
bind -T pane-mode f   resize-pane -Z  \; refresh-client -S
bind -T pane-mode z   set pane-border-status \; refresh-client -S
bind -T pane-mode c   command-prompt -I "#{window_name}" "rename-window -- '%%'" \; refresh-client -S

# Exit
bind -T pane-mode Escape refresh-client -S
bind -T pane-mode C-g    refresh-client -S

# ── TAB (window) — manage windows (Ctrl+g → t) ───────────────

bind -T tab-mode h   previous-window \; switch-client -T tab-mode \; refresh-client -S
bind -T tab-mode l   next-window     \; switch-client -T tab-mode \; refresh-client -S
bind -T tab-mode j   next-window     \; switch-client -T tab-mode \; refresh-client -S
bind -T tab-mode k   previous-window \; switch-client -T tab-mode \; refresh-client -S
bind -T tab-mode Tab last-window     \; switch-client -T tab-mode \; refresh-client -S

# One-shot actions
bind -T tab-mode n   new-window -c "#{pane_current_path}"    \; refresh-client -S
bind -T tab-mode x   confirm-before -p "Kill window? (y/n)" kill-window \; refresh-client -S
bind -T tab-mode r   command-prompt -I "#{window_name}" "rename-window -- '%%'" \; refresh-client -S
bind -T tab-mode b   break-pane      \; refresh-client -S

# Jump to window by number
bind -T tab-mode 1   select-window -t :1 \; refresh-client -S
bind -T tab-mode 2   select-window -t :2 \; refresh-client -S
bind -T tab-mode 3   select-window -t :3 \; refresh-client -S
bind -T tab-mode 4   select-window -t :4 \; refresh-client -S
bind -T tab-mode 5   select-window -t :5 \; refresh-client -S
bind -T tab-mode 6   select-window -t :6 \; refresh-client -S
bind -T tab-mode 7   select-window -t :7 \; refresh-client -S
bind -T tab-mode 8   select-window -t :8 \; refresh-client -S
bind -T tab-mode 9   select-window -t :9 \; refresh-client -S

# Exit
bind -T tab-mode Escape refresh-client -S
bind -T tab-mode C-g    refresh-client -S

# ── RESIZE — hjkl to grow, HJKL to shrink (Ctrl+g → r) ──────
# Fully sticky: stay in resize-mode until Esc

bind -T resize-mode h   resize-pane -L 2 \; switch-client -T resize-mode \; refresh-client -S
bind -T resize-mode j   resize-pane -D 2 \; switch-client -T resize-mode \; refresh-client -S
bind -T resize-mode k   resize-pane -U 2 \; switch-client -T resize-mode \; refresh-client -S
bind -T resize-mode l   resize-pane -R 2 \; switch-client -T resize-mode \; refresh-client -S
bind -T resize-mode H   resize-pane -L 5 \; switch-client -T resize-mode \; refresh-client -S
bind -T resize-mode J   resize-pane -D 5 \; switch-client -T resize-mode \; refresh-client -S
bind -T resize-mode K   resize-pane -U 5 \; switch-client -T resize-mode \; refresh-client -S
bind -T resize-mode L   resize-pane -R 5 \; switch-client -T resize-mode \; refresh-client -S
bind -T resize-mode =   resize-pane -Z   \; switch-client -T resize-mode \; refresh-client -S
bind -T resize-mode -   resize-pane -Z   \; switch-client -T resize-mode \; refresh-client -S

# Exit
bind -T resize-mode Escape refresh-client -S
bind -T resize-mode C-g    refresh-client -S

# ── MOVE — reposition panes (Ctrl+g → m) ─────────────────────

bind -T move-mode h   swap-pane -t "{left-of}"  \; switch-client -T move-mode \; refresh-client -S
bind -T move-mode j   swap-pane -t "{down-of}"  \; switch-client -T move-mode \; refresh-client -S
bind -T move-mode k   swap-pane -t "{up-of}"    \; switch-client -T move-mode \; refresh-client -S
bind -T move-mode l   swap-pane -t "{right-of}" \; switch-client -T move-mode \; refresh-client -S
bind -T move-mode n   swap-pane -D              \; switch-client -T move-mode \; refresh-client -S
bind -T move-mode Tab swap-pane -D              \; switch-client -T move-mode \; refresh-client -S
bind -T move-mode p   swap-pane -U              \; switch-client -T move-mode \; refresh-client -S

# Exit
bind -T move-mode Escape refresh-client -S
bind -T move-mode C-g    refresh-client -S

# ── SESSION — session management (Ctrl+g → o) ────────────────

bind -T session-mode d   detach-client
bind -T session-mode n   command-prompt -p "New session:" "new-session -s '%%'" \; refresh-client -S
bind -T session-mode w   choose-tree -Zs           \; refresh-client -S

# Exit
bind -T session-mode Escape refresh-client -S
bind -T session-mode C-g    refresh-client -S

# ── Copy mode (vi) — Scroll (Ctrl+g → S) ─────────────────────

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel
bind -T copy-mode-vi /   command-prompt -i -p "(search down)" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ?   command-prompt -i -p "(search up)"   "send -X search-backward-incremental \"%%%\""

# ── Plugins ──────────────────────────────────────────────────

# Plugin manager
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins"
set -g @plugin 'tmux-plugins/tpm'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Auto-save every 15 min + auto-restore on start
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Session manager (fzf popup) — bound manually via Alt+p above since prefix=None
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'off'
set -g @sessionx-zoxide-mode 'on'

# Floating popup pane — bound manually via Ctrl+g → w since prefix=None
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind 'off'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'cyan'
set -g @floax-change-path 'true'

# System clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TPM (MUST be last line)
run "$HOME/.tmux/plugins/tpm/tpm"
