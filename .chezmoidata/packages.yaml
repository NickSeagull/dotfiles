packages:
  ubuntu:
    apts:
      - "git"
      - "zsh"
      - "build-essential" 
      - "curl"
      - "libffi-dev"
      - "libffi8"
      - "libgmp-dev"
      - "libgmp10"
      - "libncurses-dev"
      - "libncurses5"
      - "libtinfo5"
      - "pkg-config"
      - "ripgrep"

    snaps:
      - name: "zellij"
        command: "zellij"

      - name: "nvim"
        command: "nvim"

    curls:
      - url: "https://starship.rs/install.sh"
        command: "starship"

      - url: "https://fnm.vercel.app/install"
        command: "fnm"

    ppas: []

  macos:
    brews:
      - "neovim"
      - "zellij"
      - "starship"
      - "lazygit"
      - "ghcup"
      - "ffmpeg"
      - "rg" # Ripgrep
      - "fnm" # Fast Node Manager
      - "black" # Python formatter

    casks:
      - "alacritty"
      - "font-jetbrains-mono-nerd-font"

    curls: []

  windows:
    wingets:
      - "Neovim.Neovim"
      - "Alacritty.Alacritty"
      - "Starship.Starship"
      - "DEVCOM.JetBrainsMonoNerdFont"
      - "JesseDuffield.lazygit"
      - "Schniz.fnm"
      - "LLVM.LLVM"
      - "Obsidian.Obsidian"
      - "zig.zig"
      - "BurntSushi.ripgrep.MSVC"

    modules:
      - "PSReadLine"
