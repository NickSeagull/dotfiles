packages:
  ubuntu:
    apts:
      - "git"
      - "zsh"
      - "build-essential"
      - "curl"
      - "libffi-dev"
      - "libffi8"
      - "libgmp-dev"
      - "libgmp10"
      - "libncurses-dev"
      - "libncurses5"
      - "libtinfo5"
      - "pkg-config"
      - "ripgrep"
      - "sl" # CHOOCHOO MOTHERFUCKER

    snaps:
      - name: "zellij"
        command: "zellij"

      - name: "nvim"
        command: "nvim"

      - name: "direnv"
        command: "direnv"

    curls:
      - url: "https://starship.rs/install.sh"
        command: "starship"

      - url: "https://fnm.vercel.app/install"
        command: "fnm"

    ppas: []

  macos:
    brews:
      - "neovim"
      - "zellij"
      - "starship"
      - "lazygit"
      - "ghcup"
      - "ffmpeg"
      - "bitwarden-cli"
      - "rg" # Ripgrep
      - "fnm" # Fast Node Manager
      - "black" # Python formatter

    casks:
      - "alacritty"
      - "font-jetbrains-mono-nerd-font"

    appstore:
      - name: "Keynote"
        id: 409183694

    curls: []

  windows:
    wingets:
      - "Neovim.Neovim"
      - "Alacritty.Alacritty"
      - "Starship.Starship"
      - "DEVCOM.JetBrainsMonoNerdFont"
      - "JesseDuffield.lazygit"
      - "Schniz.fnm"
      - "LLVM.LLVM"
      - "Obsidian.Obsidian"
      - "zig.zig"
      - "BurntSushi.ripgrep.MSVC"
      - "LGUG2Z.komorebi"
      - "LGUG2Z.whkd"
      - "Audacity.Audacity"

    modules:
      - "PSReadLine"
