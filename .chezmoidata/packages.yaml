packages:
  ubuntu:
    apts:
    - 'git'
    - 'zsh'

    snaps:
      - name: 'zellij'
        command: 'zellij'

      - name: 'nvim'
        command: 'nvim'

    curls:
      - url: 'https://starship.rs/install.sh'
        command: 'starship'


    ppas: []

  macos:
    brews:
    - 'neovim'
    - 'zellij'
    - 'starship'
    - 'lazygit'
    - 'ghcup'

    casks:
    - 'alacritty'
    - 'font-jetbrains-mono-nerd-font'


    curls: []

  windows:
    wingets:
    - 'Neovim.Neovim'
    - 'Alacritty.Alacritty'
    - 'Starship.Starship'
    - 'DEVCOM.JetBrainsMonoNerdFont'
    - 'JesseDuffield.lazygit'
    - 'Schniz.fnm'

    modules:
    - 'PSReadLine'

